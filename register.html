<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Event Registration</title>

<!-- CSS File -->
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Back button -->
<a href="index.html">⬅ Back to Home</a>

<!-- ================= REGISTRATION FORM ================= -->
<div class="form-container">

<h1>📝 Event Registration</h1>

<p>Fill details to register for events</p>

<form id="registerForm">

<!-- Student details -->
<input type="text" id="studentName" placeholder="Full Name" required>
<input type="text" id="regNo" placeholder="Register Number" required>
<input type="email" id="email" placeholder="Email" required>
<input type="tel" id="phone" placeholder="Phone Number" required>

<!-- Dropdowns -->
<select id="department" required>
  <option value="">Department</option>
  <option>CSE</option>
  <option>IT</option>
</select>

<select id="year" required>
  <option value="">Year</option>
  <option>1st</option>
  <option>2nd</option>
  <option>3rd</option>
  <option>4th</option>
</select>

<select id="event" required>
  <option value="">Event</option>
  <option>AI Workshop</option>
  <option>Hackathon</option>
</select>

<textarea id="reason" placeholder="Why do you want to participate?" required></textarea>

<button type="submit">Register</button>

</form>

</div>

<!-- ================= FOOTER ================= -->
<footer>

<h3>🎓 Student Event Management Portal</h3>
<p>© 2026 EventHub</p>

</footer>

<!-- JavaScript -->
<script src="js/script.js"></script>

</body>
</html>
